# Дефолты см. также в app/config.py — здесь фиксируется итоговая,
# экспериментально обоснованная конфигурация (выводы гл.2):
# эмбеддер deepvk/USER2-base с префиксами "classification: ", чанкинг
# fixed_60 (окно ~60% контекстного лимита модели), реранкер
# BAAI/bge-reranker-v2-m3 на глубину 20, слияние RRF с k=2, режим по умолчанию — dense.

app:
  name: "sem_search"
  log_level: "INFO"
  data_dir: "./data"

embedding:
  model_name: "deepvk/USER2-base"
  device: "cuda"
  batch_size: 32
  query_prefix: "search_query: "
  passage_prefix: "search_document: "

chunking:
  strategy: "fixed_60"
  fixed_60:
    context_limit: 512    # контекстный лимит модели в токенах
    window_ratio: 0.6     # окно ~60% лимита
    overlap_ratio: 0.2    # перекрытие ~20% окна
    unit: "tokens"
  fixed_window:
    chunk_size: 256
    overlap: 51    # ~20% of 256 tokens
    unit: "tokens"
  sentence_window:
    window_sentences: 3
    stride_sentences: 2
  paragraph:
    min_chars: 0

lexical:
  use_lemmatization: true
  match_mode: "lemma"
  bm25:
    k1: 1.5
    b: 0.75

vector_store:
  backend: "qdrant"
  qdrant:
    mode: "embedded"
    path: "./data/qdrant"
    url: "http://qdrant:6333"
    collection_name: "sem_search_chunks"

retrieval:
  candidate_k: 50

hybridization:
  method: "rrf"
  rrf_k: 2
  weighted:
    dense_weight: 0.5
    lexical_weight: 0.5
    normalization: "minmax"

reranking:
  enabled: true
  model_name: "BAAI/bge-reranker-v2-m3"
  device: "cuda"
  top_n: 20
  batch_size: 16

query_processing:
  typo_correction:
    enabled: true
    max_distance: 2
    score_cutoff: 80.0
  # Унифицированные словари расширения запроса.
  # Каждый .json / .yaml файл в dictionaries_dir загружается как словарь.
  # Формат: "слово": "расширение" или "слово": ["расширение1", "расширение2"].
  dictionaries_enabled: true
  dictionaries_dir: "./data/dictionaries"

search:
  default_mode: "dense"
  default_top_k: 10

admin:
  manifest_path: "./data/index_manifest.json"
  query_log_path: "./data/logs/queries.jsonl"
  lexical_index_dir: "./data/lexical"
